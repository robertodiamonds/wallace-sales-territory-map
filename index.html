<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sales Territory Map</title>
<style>
html,body{margin:0;padding:0;height:100%;font-family:Arial,sans-serif}
#map{width:100%;height:100vh}

/* Panel */
#panel{
  position:absolute;top:10px;right:10px;z-index:9999;
  background:white;border-radius:12px;padding:16px 18px;
  box-shadow:0 3px 16px rgba(0,0,0,0.28);min-width:240px;max-width:260px;
}
#panel h3{margin:0 0 12px;font-size:14px;color:#222;border-bottom:1px solid #eee;padding-bottom:8px}

/* Search box */
#search-wrap{position:relative;margin-bottom:12px}
#search{
  width:100%;box-sizing:border-box;padding:9px 34px 9px 11px;
  border:1.5px solid #ddd;border-radius:8px;font-size:13px;
  outline:none;transition:border-color .2s;
}
#search:focus{border-color:#1565C0}
#search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:15px;pointer-events:none}
#search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:18px;cursor:pointer;display:none;background:none;border:none;padding:0;line-height:1}
#search-clear:hover{color:#555}

/* Search results dropdown */
#results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:white;border:1.5px solid #ddd;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:10000;
  max-height:200px;overflow-y:auto;display:none;
}
.result-item{
  padding:9px 12px;cursor:pointer;font-size:13px;
  border-bottom:1px solid #f5f5f5;
}
.result-item:last-child{border-bottom:none}
.result-item:hover{background:#f0f7ff}
.result-rep{font-size:11px;font-weight:700;margin-top:2px}
.result-zip{color:#888;font-size:11px}

/* Result card */
#result-card{
  background:#f8f9ff;border:1.5px solid #e0e8ff;border-radius:8px;
  padding:11px 13px;margin-bottom:12px;display:none;position:relative;
}
#result-card h4{margin:0 0 4px;font-size:13px;color:#333}
#result-card .rep-name{font-size:15px;font-weight:700;margin-bottom:2px}
#result-card .rep-detail{font-size:11px;color:#777}
#result-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:16px;cursor:pointer;color:#aaa;padding:0}
#result-close:hover{color:#555}
.result-swatch{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}

/* Rep legend buttons */
.rb{
  display:flex;align-items:center;gap:8px;padding:7px 10px;margin:3px 0;
  border-radius:6px;cursor:pointer;font-size:13px;border:2px solid transparent;
  transition:all .15s;user-select:none;
}
.rb:hover{background:#f5f5f5}
.rb.on{font-weight:700}
.sw{width:15px;height:15px;border-radius:3px;flex-shrink:0;opacity:0.85}
.ct{margin-left:auto;color:#999;font-size:11px;font-weight:normal}
#showall{
  width:100%;padding:7px;margin-top:8px;border:1px solid #ddd;
  border-radius:6px;background:#f9f9f9;cursor:pointer;font-size:12px;font-family:Arial;
}
#showall:hover{background:#eee}
#note{font-size:10px;color:#bbb;margin-top:10px;text-align:center;line-height:1.5}

/* Search marker popup */
.search-popup{text-align:center}
.search-popup .sp-rep{font-size:14px;font-weight:700;margin:4px 0 2px}
.search-popup .sp-loc{font-size:12px;color:#666}
.search-popup .sp-zip{font-size:11px;color:#999;margin-top:2px}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <h3>&#x1F5FA; Sales Territory Map</h3>

  <!-- Search -->
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search city or zip code..." autocomplete="off"/>
    <span id="search-icon">&#x1F50D;</span>
    <button id="search-clear" title="Clear">&#x2715;</button>
    <div id="results"></div>
  </div>

  <!-- Result card -->
  <div id="result-card">
    <button id="result-close" onclick="clearResult()">&#x2715;</button>
    <h4 id="rc-location"></h4>
    <div class="rep-name" id="rc-rep"></div>
    <div class="rep-detail" id="rc-detail"></div>
  </div>

  <!-- Rep legend -->
  <div id="rlist"></div>
  <button id="showall" onclick="showAll()">&#x21BA; Show All Territories</button>
  <div id="note">Shaded regions show full territory coverage<br>expanded to fill gaps between reps.</div>
</div>

// ── Map setup ──────────────────────────────────────────────
var map = L.map('map',{zoomControl:true}).setView([33.2,-84.5],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',
  subdomains:'abcd', maxZoom:19, crossOrigin:true
}).addTo(map);

// ── Voronoi shading ────────────────────────────────────────
var pts    = SEEDS.map(function(s){return [s[1],s[0]];});
var repIdx = SEEDS.map(function(s){return s[2];});

var corners = [
  [BOUNDS.minLng,BOUNDS.minLat],[BOUNDS.maxLng,BOUNDS.minLat],
  [BOUNDS.minLng,BOUNDS.maxLat],[BOUNDS.maxLng,BOUNDS.maxLat],
  [-88,29.8],[-80,29.8],[-91.5,33],[-75.2,33],[-88,36.9],[-80,36.9]
];
var allPts    = pts.concat(corners);
var allRepIdx = repIdx.slice();
corners.forEach(function(c){ allRepIdx.push(findNearest(c,pts,repIdx)); });

var delaunay = d3.Delaunay.from(allPts);
var voronoi  = delaunay.voronoi([BOUNDS.minLng,BOUNDS.minLat,BOUNDS.maxLng,BOUNDS.maxLat]);

var layers = REPS.map(function(){return L.layerGroup().addTo(map);});

for(var i=0;i<allPts.length;i++){
  var cell = voronoi.cellPolygon(i);
  if(!cell) continue;
  var ri    = allRepIdx[i];
  var color = COLORS[ri];
  var latlngs = cell.map(function(p){return [p[1],p[0]];});
  L.polygon(latlngs,{
    fillColor:color, fillOpacity:ALPHA,
    color:color, weight:0.3, opacity:0.5
  }).addTo(layers[ri]);
}

function findNearest(pt,pts2,idx){
  var best=0, bestD=Infinity;
  for(var j=0;j<pts2.length;j++){
    var dx=pt[0]-pts2[j][0], dy=pt[1]-pts2[j][1];
    var d=dx*dx+dy*dy;
    if(d<bestD){bestD=d;best=j;}
  }
  return idx[best]||0;
}

// ── Legend ─────────────────────────────────────────────────
var rl=document.getElementById('rlist'), active=-1;
REPS.forEach(function(name,i){
  var d=document.createElement('div');
  d.className='rb'; d.id='rb'+i;
  d.style.borderColor=COLORS[i];
  d.innerHTML='<div class="sw" style="background:'+COLORS[i]+'"></div>'+name+
    '<span class="ct">'+COUNTS[i]+' zips</span>';
  d.onclick=function(){filterRep(i);};
  rl.appendChild(d);
});

function filterRep(ri){
  if(active===ri){showAll();return;}
  active=ri;
  for(var i=0;i<REPS.length;i++){
    var el=document.getElementById('rb'+i);
    el.classList.toggle('on',i===ri);
    el.style.background=(i===ri)?COLORS[ri]+'22':'';
    if(i===ri){if(!map.hasLayer(layers[i]))map.addLayer(layers[i]);}
    else{if(map.hasLayer(layers[i]))map.removeLayer(layers[i]);}
  }
}
function showAll(){
  active=-1;
  for(var i=0;i<REPS.length;i++){
    var el=document.getElementById('rb'+i);
    el.classList.remove('on'); el.style.background='';
    if(!map.hasLayer(layers[i]))map.addLayer(layers[i]);
  }
}

// ── Nearest-rep lookup from lat/lng ───────────────────────
function repForLatLng(lat,lng){
  var best=0, bestD=Infinity;
  for(var j=0;j<pts.length;j++){
    var dx=lng-pts[j][0], dy=lat-pts[j][1];
    var d=dx*dx+dy*dy;
    if(d<bestD){bestD=d;best=j;}
  }
  return repIdx[best];
}

// ── Search ─────────────────────────────────────────────────
var searchEl   = document.getElementById('search');
var resultsEl  = document.getElementById('results');
var clearBtn   = document.getElementById('search-clear');
var resultCard = document.getElementById('result-card');
var searchMarker = null;
var debounceT  = null;

searchEl.addEventListener('input', function(){
  var q = searchEl.value.trim();
  clearBtn.style.display = q ? 'block' : 'none';
  document.getElementById('search-icon').style.display = q ? 'none' : 'block';
  clearTimeout(debounceT);
  if(q.length < 2){ resultsEl.style.display='none'; return; }
  debounceT = setTimeout(function(){ doSearch(q); }, 350);
});

searchEl.addEventListener('keydown', function(e){
  if(e.key==='Escape'){ closeResults(); searchEl.blur(); }
});

document.addEventListener('click', function(e){
  if(!document.getElementById('search-wrap').contains(e.target)) closeResults();
});

clearBtn.addEventListener('click', function(){
  searchEl.value='';
  clearBtn.style.display='none';
  document.getElementById('search-icon').style.display='block';
  closeResults();
  clearResult();
});

function closeResults(){ resultsEl.style.display='none'; }

function doSearch(q){
  q = q.trim();
  var isZip = /^\d{3,5}$/.test(q);
  var url;

  if(isZip){
    // Geocode a zip code
    url = 'https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&postalcode='+
      encodeURIComponent(q)+'&limit=5&addressdetails=1';
  } else {
    // Geocode a city/place — bias to our 6 states
    url = 'https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&q='+
      encodeURIComponent(q)+'&limit=8&addressdetails=1&viewbox=-91.5,36.9,-75.2,29.8&bounded=1';
  }

  fetch(url, {headers:{'Accept-Language':'en','User-Agent':'SalesTerritoryMap/1.0'}})
    .then(function(r){return r.json();})
    .then(function(data){
      showResults(data, q, isZip);
    })
    .catch(function(){
      resultsEl.innerHTML='<div class="result-item" style="color:#999">Error reaching geocoder. Try again.</div>';
      resultsEl.style.display='block';
    });
}

function showResults(data, q, isZip){
  if(!data || data.length===0){
    resultsEl.innerHTML='<div class="result-item" style="color:#999">No results found in NC, SC, TN, AL, MS, GA.</div>';
    resultsEl.style.display='block';
    return;
  }

  // Filter to our 6 states
  var stateCodes = {nc:1,sc:1,tn:1,al:1,ms:1,ga:1,'north carolina':1,'south carolina':1,
    tennessee:1,alabama:1,mississippi:1,georgia:1};
  var filtered = data.filter(function(d){
    var addr = d.address || {};
    var st = (addr.state||'').toLowerCase();
    var sc2 = (addr.state_code||addr['ISO3166-2-lvl4']||'').toLowerCase().replace('us-','');
    return stateCodes[st] || stateCodes[sc2];
  });

  // If nothing matched the filter, still show top results (user may search across border)
  if(filtered.length===0) filtered = data.slice(0,5);

  resultsEl.innerHTML='';
  filtered.slice(0,6).forEach(function(d){
    var lat=parseFloat(d.lat), lng=parseFloat(d.lon);
    var ri = repForLatLng(lat,lng);
    var addr = d.address||{};
    var city  = addr.city||addr.town||addr.village||addr.county||d.display_name.split(',')[0];
    var state = addr.state||'';
    var zip   = addr.postcode||'';
    var label = city+(state?', '+state:'')+(zip?' '+zip:'');

    var item = document.createElement('div');
    item.className='result-item';
    item.innerHTML=
      '<div style="font-weight:600">'+city+(state?', '+state:'')+'</div>'+
      '<div class="result-rep" style="color:'+COLORS[ri]+'">&#x25A0; '+REPS[ri]+'</div>'+
      (zip?'<div class="result-zip">ZIP: '+zip+'</div>':'');
    item.onclick=function(){
      closeResults();
      showOnMap(lat,lng,city,state,zip,ri);
    };
    resultsEl.appendChild(item);
  });
  resultsEl.style.display='block';
}

function showOnMap(lat,lng,city,state,zip,ri){
  // Remove old marker
  if(searchMarker){ map.removeLayer(searchMarker); searchMarker=null; }

  // Fly to location
  map.flyTo([lat,lng], 10, {duration:1.2});

  // Place marker
  var icon = L.divIcon({
    className:'',
    html:'<div style="width:22px;height:22px;background:'+COLORS[ri]+';border:3px solid white;'+
         'border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>',
    iconSize:[22,22], iconAnchor:[11,11]
  });
  searchMarker = L.marker([lat,lng],{icon:icon}).addTo(map);

  // Show result card
  var loc = city+(state?', '+state:'');
  document.getElementById('rc-location').textContent = loc + (zip?' (ZIP '+zip+')':'');
  document.getElementById('rc-rep').innerHTML =
    '<span class="result-swatch" style="background:'+COLORS[ri]+'"></span>'+REPS[ri];
  document.getElementById('rc-detail').textContent = 'Sales representative for this area';
  resultCard.style.display='block';
  resultCard.style.borderColor = COLORS[ri]+'88';
  resultCard.style.background  = COLORS[ri]+'0d';
}

function clearResult(){
  resultCard.style.display='none';
  if(searchMarker){ map.removeLayer(searchMarker); searchMarker=null; }
}

// Allow clicking map to find rep
map.on('click', function(e){
  var lat=e.latlng.lat, lng=e.latlng.lng;
  // Only respond if within rough bounds
  if(lat<29.5||lat>37.1||lng<-92||lng>-74.5) return;
  var ri = repForLatLng(lat,lng);

  // Reverse geocode
  fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+
    '&addressdetails=1',{headers:{'Accept-Language':'en'}})
    .then(function(r){return r.json();})
    .then(function(d){
      var addr=d.address||{};
      var city=addr.city||addr.town||addr.village||addr.county||'This location';
      var state=addr.state||'';
      var zip=addr.postcode||'';
      showOnMap(lat,lng,city,state,zip,ri);
    })
    .catch(function(){
      showOnMap(lat,lng,'This location','','',ri);
    });
});
